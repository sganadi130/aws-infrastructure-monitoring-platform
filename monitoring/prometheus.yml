global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'app-instances'
    static_configs:
      - targets:
          - '10.0.10.220:9100'
          - '10.0.20.166:9100'
        labels:
          environment: 'dev'
          managed_by: 'lambda-scheduler'

  - job_name: 'monitoring-instance'
    static_configs:
      - targets: ['10.0.2.26:9100']
